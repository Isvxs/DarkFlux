<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANON_PROTOCOL // V3.5</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --me-bg: #0A84FF;
            --stranger-bg: #1C1C1E;
            --sys-text: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(0, 0, 0, 0.8);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: absolute;
            top: 0; left: 0; right: 0;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #FF9500;
            border-radius: 50%;
            margin-right: 10px;
            transition: background 0.3s, box-shadow 0.3s;
        }

        #chat-flow {
            flex: 1;
            padding: 80px 15px 110px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 0px; }

        /* 訊息動畫與氣泡 */
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            animation: apple-slide 0.5s cubic-bezier(0.2, 1, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes apple-slide {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg {
            max-width: 80%;
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.45;
            border-radius: 18px;
            position: relative;
            cursor: pointer;
        }

        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.me .msg { background: var(--me-bg); color: #fff; border-bottom-right-radius: 4px; }

        .msg-wrapper.stranger { align-items: flex-start; }
        .msg-wrapper.stranger .msg { background: var(--stranger-bg); color: #fff; border-bottom-left-radius: 4px; }

        /* 圖片容器與尺寸標籤 */
        .img-container { position: relative; line-height: 0; margin: 4px 0; }
        .msg img { max-width: 100%; border-radius: 12px; }
        .img-meta {
            position: absolute; bottom: 6px; right: 6px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(5px);
            color: #fff; font-size: 9px;
            padding: 2px 6px; border-radius: 4px;
            pointer-events: none; opacity: 0.8;
        }

        .reply-quote {
            font-size: 12px; background: rgba(255,255,255,0.1);
            padding: 6px 10px; border-radius: 10px;
            margin-bottom: 4px; border-left: 3px solid rgba(255,255,255,0.3);
            opacity: 0.8;
        }

        /* 正在輸入 */
        #typing-indicator {
            align-self: flex-start;
            background: var(--stranger-bg);
            padding: 12px 16px; border-radius: 18px;
            display: none; align-items: center; gap: 4px;
            margin-bottom: 5px;
        }
        #typing-indicator.active { display: flex; animation: fade-in 0.3s; }

        footer {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--glass); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border);
            padding: 10px 15px 25px 15px;
            z-index: 10;
        }

        #reply-preview {
            display: none; justify-content: space-between;
            background: var(--stranger-bg); padding: 8px 12px;
            border-radius: 12px; font-size: 12px; margin-bottom: 10px;
            border-left: 3px solid var(--me-bg);
        }
        #reply-preview.active { display: flex; }

        .input-bar { display: flex; align-items: center; gap: 10px; }
        .input-wrapper {
            flex: 1; background: #262629;
            border-radius: 20px; padding: 8px 15px;
        }
        input[type="text"] {
            width: 100%; background: transparent; border: none;
            color: #fff; outline: none; font-size: 16px;
        }
        
        .btn-icon { background: none; border: none; color: var(--sys-text); cursor: pointer; display: flex; }
        
        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="overlay">
    <button onclick="initProtocol()" style="background:none; border:1px solid #fff; color:#fff; padding:12px 25px; cursor:pointer; font-size:12px; letter-spacing:2px; text-transform:uppercase;">Initialize Protocol</button>
</div>

<div id="app-container">
    <header>
        <div class="status-dot" id="dot"></div>
        <span id="status-text">Ready</span>
    </header>

    <main id="chat-flow">
        <div id="typing-indicator">
            <div style="width:5px;height:5px;background:#8E8E93;border-radius:50%;animation:bounce 1.4s infinite"></div>
            <div style="width:5px;height:5px;background:#8E8E93;border-radius:50%;animation:bounce 1.4s infinite 0.2s"></div>
            <div style="width:5px;height:5px;background:#8E8E93;border-radius:50%;animation:bounce 1.4s infinite 0.4s"></div>
        </div>
    </main>

    <footer id="input-wrap">
        <div id="reply-preview">
            <span id="reply-text"></span>
            <span onclick="cancelReply()" style="cursor:pointer">✕</span>
        </div>
        <div class="input-bar">
            <button class="btn-icon" onclick="document.getElementById('file-input').click()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <input type="file" id="file-input" accept="image/*" style="display:none">
            <div class="input-wrapper">
                <input type="text" id="m-input" placeholder="Message..." autocomplete="off">
            </div>
        </div>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhH-mST6_gPbOCJxFhJBe9FSK-iVYPmpw",
        authDomain: "plchat-69b04.firebaseapp.com",
        databaseURL: "https://plchat-69b04-default-rtdb.firebaseio.com",
        projectId: "plchat-69b04",
        storageBucket: "plchat-69b04.firebasestorage.app",
        messagingSenderId: "131639913861",
        appId: "1:131639913861:web:c5c07002169470961668ec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const myId = Math.random().toString(36).substring(7);
    let currentRoomId = null;
    let replyTarget = null;

    const statusText = document.getElementById('status-text');
    const dot = document.getElementById('dot');
    const flowEl = document.getElementById('chat-flow');
    const inputEl = document.getElementById('m-input');
    const typingIndicator = document.getElementById('typing-indicator');

    window.initProtocol = () => {
        document.getElementById('overlay').style.display = 'none';
        startMatch();
    };

    async function startMatch() {
        statusText.innerText = 'Searching...';
        dot.style.background = '#FF9500';
        dot.style.boxShadow = '0 0 8px #FF9500';

        const poolRef = ref(db, 'waiting_pool');
        const snapshot = await get(poolRef);
        
        if (snapshot.exists()) {
            const waiters = snapshot.val();
            const opponentId = Object.keys(waiters)[0];
            currentRoomId = waiters[opponentId].roomId;
            await remove(ref(db, `waiting_pool/${opponentId}`));
            await push(ref(db, `rooms/${currentRoomId}/messages`), { sender: "sys", text: "sync" });
            beginChat(currentRoomId);
        } else {
            currentRoomId = `room_${myId}`;
            await set(ref(db, `waiting_pool/${myId}`), { roomId: currentRoomId });
            onDisconnect(ref(db, `waiting_pool/${myId}`)).remove();
            
            const syncRef = ref(db, `rooms/${currentRoomId}/messages`);
            const unsub = onValue(syncRef, (s) => { if(s.exists()){ unsub(); beginChat(currentRoomId); }});
        }
    }

    function beginChat(roomId) {
        statusText.innerText = 'Connected';
        dot.style.background = '#34C759';
        dot.style.boxShadow = '0 0 8px #34C759';

        const presenceRef = ref(db, `rooms/${roomId}/presence/${myId}`);
        onDisconnect(presenceRef).remove();
        set(presenceRef, true);

        // 監聽對方是否離開
        onValue(ref(db, `rooms/${roomId}/presence`), (snap) => {
            if (snap.exists() && Object.keys(snap.val()).length < 2) {
                setTimeout(async () => {
                    const check = await get(ref(db, `rooms/${roomId}/presence`));
                    if(!check.exists() || Object.keys(check.val()).length < 2) location.reload();
                }, 4000);
            }
        });

        // 監聽訊息與打字
        onValue(ref(db, `rooms/${roomId}/messages`), (s) => {
            if(!s.exists()) return;
            const msgs = Object.values(s.val()).filter(m => m.sender !== "sys");
            updateUI(msgs.slice(-30));
        });

        onValue(ref(db, `rooms/${roomId}/typing`), (s) => {
            const typers = s.val() || {};
            const isTyping = Object.keys(typers).some(id => id !== myId);
            isTyping ? typingIndicator.classList.add('active') : typingIndicator.classList.remove('active');
        });
    }

    async function sendMessage(text, type = 'text', info = null) {
        if (!text || !currentRoomId) return;
        const msgRef = ref(db, `rooms/${currentRoomId}/messages`);
        
        // 物理清理：超過 30 條刪除最舊
        const snap = await get(msgRef);
        if(snap.exists()){
            const keys = Object.keys(snap.val());
            if(keys.length >= 30) await remove(ref(db, `rooms/${currentRoomId}/messages/${keys[0]}`));
        }

        const payload = { sender: myId, text, type, info, ts: serverTimestamp() };
        if(replyTarget) { payload.replyTo = replyTarget; cancelReply(); }
        
        await push(msgRef, payload);
        inputEl.value = '';
        setTyping(false);
    }

    function updateUI(msgs) {
        const typing = typingIndicator;
        flowEl.innerHTML = '';
        flowEl.appendChild(typing);
        
        [...msgs].reverse().forEach(m => {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${m.sender === myId ? 'me' : 'stranger'}`;
            
            let html = m.replyTo ? `<div class="reply-quote">${m.replyTo.text}</div>` : '';
            if(m.type === 'image'){
                html += `<div class="img-container"><img src="${m.text}">${m.info ? `<span class="img-meta">${m.info.size} · ${m.info.format}</span>`:''}</div>`;
            } else {
                html += m.text;
            }

            wrap.innerHTML = `<div class="msg" onclick="setReply('${m.sender}', \`${m.type==='image'?'[Image]':m.text.substring(0,20)}\`)">${html}</div>`;
            flowEl.appendChild(wrap);
        });
    }

    window.setReply = (sId, text) => {
        replyTarget = { sender: sId, text: text };
        document.getElementById('reply-text').innerText = `Replying to: ${text}`;
        document.getElementById('reply-preview').classList.add('active');
        inputEl.focus();
    };

    window.cancelReply = () => {
        replyTarget = null;
        document.getElementById('reply-preview').classList.remove('active');
    };

    // 打字偵測
    let tTimer;
    const setTyping = (v) => set(ref(db, `rooms/${currentRoomId}/typing/${myId}`), v ? true : null);
    inputEl.oninput = () => { setTyping(true); clearTimeout(tTimer); tTimer = setTimeout(()=>setTyping(false), 2000); };
    inputEl.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(inputEl.value.trim()); };

    // 圖片壓縮與 Size 計算
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const sizeStr = (file.size / 1024 / 1024).toFixed(1) + ' MB';
        const fmt = file.type.split('/')[1].toUpperCase();

        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 800;
                let w = img.width, h = img.height;
                if(w > MAX) { h *= MAX/w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                sendMessage(canvas.toDataURL('image/jpeg', 0.7), 'image', { size: sizeStr, format: fmt });
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

</script>

<style>
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>
</body>
</html>
