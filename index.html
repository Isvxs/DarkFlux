<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANON_CHAT_V1</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent: #333333;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Builder Sans', 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.5px;
        }

        /* 狀態列 */
        #header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
        }

        /* 聊天區域 */
        #chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 4px 0;
            line-height: 1.5;
            font-size: 15px;
            word-break: break-all;
        }

        .msg::before {
            content: "> ";
            opacity: 0.5;
        }

        .msg.system { color: #666; font-style: italic; }
        .msg.me { color: var(--fg); }
        .msg.stranger { color: #aaa; }

        /* 輸入區域 */
        #input-container {
            padding: 25px 20px;
            border-top: 1px solid var(--accent);
            display: flex;
            align-items: center;
        }

        #input-container.hidden { display: none; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            caret-color: var(--fg);
        }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

<div id="header">
    <span id="status">Status: Initializing...</span>
    <span id="counter">Log: 0/30</span>
</div>

<div id="chat-flow">
    <div class="msg system">system: initializing anonymous protocol...</div>
</div>

<div id="input-container" class="hidden">
    <input type="text" id="m-input" placeholder="Type message..." autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    // 使用你提供的配置
    const firebaseConfig = {
        apiKey: "AIzaSyDhH-mST6_gPbOCJxFhJBe9FSK-iVYPmpw",
        authDomain: "plchat-69b04.firebaseapp.com",
        databaseURL: "https://plchat-69b04-default-rtdb.firebaseio.com",
        projectId: "plchat-69b04",
        storageBucket: "plchat-69b04.firebasestorage.app",
        messagingSenderId: "131639913861",
        appId: "1:131639913861:web:c5c07002169470961668ec",
        measurementId: "G-E1ZNB3NS8F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let currentRoomId = null;
    let myId = Math.random().toString(36).substring(7);
    const statusEl = document.getElementById('status');
    const flowEl = document.getElementById('chat-flow');
    const inputCont = document.getElementById('input-container');
    const inputEl = document.getElementById('m-input');
    const counterEl = document.getElementById('counter');

    async function startMatching() {
        statusEl.innerText = "Status: Searching for stranger...";
        const waitingRef = ref(db, 'waiting_pool');
        const snapshot = await get(waitingRef);
        
        if (snapshot.exists()) {
            const waiters = snapshot.val();
            const opponentId = Object.keys(waiters)[0];
            currentRoomId = waiters[opponentId].roomId;
            
            // 進入房間並從等待區移除對方
            await remove(ref(db, `waiting_pool/${opponentId}`));
            initChat(currentRoomId);
        } else {
            // 建立新房間並等待
            currentRoomId = `room_${myId}`;
            await set(ref(db, `waiting_pool/${myId}`), { roomId: currentRoomId });
            onDisconnect(ref(db, `waiting_pool/${myId}`)).remove();
            
            // 監聽是否有人進房 (發送了第一條訊息)
            const roomRef = ref(db, `rooms/${currentRoomId}/messages`);
            const unsubscribe = onValue(roomRef, (snap) => {
                if (snap.exists()) {
                    unsubscribe();
                    initChat(currentRoomId);
                }
            });
        }
    }

    function initChat(roomId) {
        statusEl.innerText = "Status: Connected / Anonymous";
        inputCont.classList.remove('hidden');
        
        const roomRef = ref(db, `rooms/${roomId}`);
        const messagesRef = ref(db, `rooms/${roomId}/messages`);

        // 重要：關閉頁面時徹底刪除房間並踢掉對方
        onDisconnect(roomRef).remove();

        onValue(roomRef, (snapshot) => {
            if (!snapshot.exists()) {
                // 如果房間被刪除（對方離開），強制重新整理頁面實現「重新配對」
                location.reload();
                return;
            }
            
            const data = snapshot.val().messages;
            if (data) {
                const msgArray = Object.values(data);
                // 只取最後 30 條，實現第 31 條覆蓋第 1 條的視覺效果
                render(msgArray.slice(-30));
            }
        });
    }

    function render(list) {
        flowEl.innerHTML = '';
        list.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender === myId ? 'me' : 'stranger'}`;
            div.innerText = `${m.sender === myId ? 'YOU' : 'STRANGER'}: ${m.text}`;
            flowEl.appendChild(div);
        });
        flowEl.scrollTop = flowEl.scrollHeight;
        counterEl.innerText = `Log: ${list.length}/30`;
    }

    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && inputEl.value.trim() !== '') {
            const mRef = ref(db, `rooms/${currentRoomId}/messages`);
            push(mRef, {
                sender: myId,
                text: inputEl.value,
                time: serverTimestamp()
            });
            inputEl.value = '';
        }
    });

    startMatching();
</script>
</body>
</html>
